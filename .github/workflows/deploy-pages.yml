name: Deploy web to GitHub Pages

# Deploys apps/web to https://<owner>.github.io/<repo>/ on every push to main.
# The Render API URL is injected at build time via a repo secret so the static
# bundle knows where to send requests.
#
# Pre-requisites:
#   1. Deploy apps/api to Render using render.yaml (connect this repo on render.com).
#   2. Add repo secret VITE_API_URL = https://<your-render-service>.onrender.com
#      in GitHub: Settings -> Secrets and variables -> Actions -> New repository secret.
#   3. On Render, set env var CORS_ORIGINS = https://lavishtakkar.github.io
#
# Security: this workflow only reads secrets.VITE_API_URL (inside env:, not
# in a run: block) and the deploy step output. It never interpolates
# github.event.* strings into any run: script.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build web
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web
        env:
          # Set this secret in the repo: Settings -> Secrets and variables ->
          # Actions -> New repository secret -> VITE_API_URL (e.g.
          # https://luminate-lms-api.fly.dev)
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: pnpm --filter @lms/web build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    name: Publish
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
