<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Luminate — AI-powered learning</title>
    <meta
      name="description"
      content="Personal learning platform with AI quiz generation, note summaries, and an always-on tutor."
    />
    <meta name="theme-color" content="#6f46d0" />
    <meta property="og:title" content="Luminate — AI-powered learning" />
    <meta
      property="og:description"
      content="Personal learning platform with AI quiz generation, note summaries, and an always-on tutor."
    />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&display=swap"
      rel="stylesheet"
    />
    <script>
      // ─── GitHub Pages SPA fallback decoder ─────────────────────────────
      // 404.html encodes the original URL into a query like "?/foo/bar".
      // Here we convert that back into a real pathname before React Router
      // boots, so deep links like /luminate-lms/courses/123 survive a hard
      // reload. No-op when there's no encoded path.
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            })
            .join("?");
          window.history.replaceState(
            null,
            "",
            l.pathname.slice(0, -1) + decoded + l.hash,
          );
        }
      })(window.location);

      // Apply theme preference before React mounts to avoid flash.
      (() => {
        const saved = localStorage.getItem("lms:theme");
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        if (saved === "dark" || (!saved && prefersDark)) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
